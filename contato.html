<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford - Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="headerfooter.css">
</head>
<body>

<!------Cabeçalho-->

    <header>
        <div class="logoheader">
            <img src= "img/logo-ford-256.png" alt="Logo Ford">
        </div>
        <nav class="navegar">
          <ul class="textoHeaderMainRodape">
            <li><a href = "index.html"> Home </a></li>
            <li><a href = "lancamento.html"> Lançamento </a></li>
            <li><a href = "contato.html"> Contato </a></li>
          </ul>
        </nav>
    </header>

<!------Corpo-->

    <main class="espacamentoTabelaCarro">

     <div class="espacamentoCarro">

        <div class="fotoCarro" >
            <img src="img/xls 2.2 diesel.jpg">
        </div>

        <div class="formulario">
            <h2 style="text-align: center; margin-bottom: 10px;" class="btn"> Fale Conosco </h2>
            
            <form class="larguraTabela" action="#" method="post">
                <label class="btn" for="nome"> Nome do usuário: </label>
                <input type="text" id="nome" name="nome" required>

                <label class="btn" for="email"> E-mail para contato: </label>
                <input type="email" id="email" name="email" required>

                <label class="btn" for="telefone"> Telefone: </label>
                <input type="tel" id="telefone" name="telefone">

                <label class="btn" for="tipo-contato"> Tipo do contato: </label>
                <select id="tipo-contato" name="tipo-contato">
                    <option value="elogio"> Elogio </option>
                    <option value="reclamacao"> Reclamação </option>
                    <option value="solicitacao"> Solicitação </option>
                </select>

                <label class="btn" for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>

                <button type="submit" class="btn2">Enviar</button>
            </form>
        </div>
     </div>
    </main>

<!------Rodapé-->

    <footer>
        <div>
        <span> Redes Sociais </span>
            <a href = "http://www.facebook.com/FordBrasil/"><img src = "img/facebook-50.png" alt="Logo Facebook"></a>
            <a href = "https://www.youtube.com/@fordbrasil"><img src = "img/youtube-squared-50.png" alt="Logo Youtube"></a>
            <a href = "http://www.instagram.com/FordBrasil"><img src = "img/instagram-logo-50.png" alt = "Logo Instagram"></a>
        </div>
            
        <div>
            <span> &copy; Ford 2026. Todos os direitos reservados. </span>
        </div>

        <div class="imagens_rodape">
            <img src = "img/ford-96.png" alt = "Logo Ford toda azul">
        </div>

    </footer> 

</body>
</html>
